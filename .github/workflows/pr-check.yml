name: PR Health Check

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18.14.0"
          cache: "npm"
      - run: npm ci
      - run: npm run lint

  build:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: https://placeholder.supabase.co
      SUPABASE_KEY: placeholder_key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18.14.0"
          cache: "npm"
      - run: npm ci
      - run: npm run build
